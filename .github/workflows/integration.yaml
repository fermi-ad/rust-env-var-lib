name: Rust Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests-and-coverage:
    uses: fermi-ad/.github/.github/workflows/rust-integration.yaml@6e196e87b3b79167b57bf18cf3ca0cfcd88f958f
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
    with:
      # Exclude the `lib.rs` file from coverage metrics, as it just has the reference to the internal module.
      coverage-exclude: "|src/lib.rs"

  deploy-docs:
    needs: run-tests-and-coverage
    if: ${{ github.event_name == 'push' }}
    uses: fermi-ad/.github/.github/workflows/deploy-rust-docs.yaml@6e7454e04e62819b8b2ac97599cf2f77db3c238c
    secrets: inherit 
    permissions:
      contents: write
      id-token: write
      pages: write